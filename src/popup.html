<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>hime</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <h1>hime ⚡</h1>
    <p class="subtitle">AI-native IME</p>
    
    <div class="direction">
      <span id="sourceLang">English</span>
      <span class="arrow">→</span>
      <span id="targetLang">Japanese</span>
    </div>
    
    <button id="swapBtn" class="btn-primary">Swap Direction</button>
    <button id="openOptions" class="btn-secondary">Settings</button>
    
    <div class="hotkeys">
      <h3>Hotkeys</h3>
      <ul>
        <li><kbd>Ctrl+Shift+T</kbd> Compose</li>
        <li><kbd>Ctrl+Shift+Y</kbd> YOLO</li>
        <li><kbd>Ctrl+Shift+S</kbd> Swap</li>
      </ul>
    </div>
  </div>
  
  <script type="module" src="popup.js"></script>
</body>
</html>
